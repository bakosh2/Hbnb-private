<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB Evolution - Places</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="logo.png" alt="HBnB Logo" class="logo">
        </div>
        <nav>
            <a href="index.html">Home</a>
            
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        
        <section id="filters">
            <div class="filter-item">
                <label for="price-filter">Filter by Price:</label>
                <select id="price-filter">
                    <option value="All">All Prices</option>
                    <option value="50">$50 or less</option>
                    <option value="100">$100 or less</option>
                    <option value="200">$200 or less</option>
                </select>
            </div>

            <div class="filter-item">
                <label for="country-filter">Filter by Country:</label>
                <select id="country-filter">
                    <option value="all">All Countries</option>
                 
                </select>
            </div>
        </section>

        <section class="places-section">
            <h2>Available Places</h2>
            
          
            <div id="places-list" class="places-grid">
                <p class="info-message">Fetching data from the server...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 HBnB Evolution. All rights reserved.</p>
    </footer>

    
    <script src="scripts.js"></script>
</body>
</html>
