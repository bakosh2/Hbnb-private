<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review - HBnB</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <img src="logo.png" class="logo" alt="HBnB Logo">
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html" id="login-link" class="login-button">Login</a>
    </nav>
</header>

<main>
    <section class="form-container">
        <h2>Add Review</h2>

        
        <form id="review-form" class="form">
            <div class="input-group">
                <label for="review-text">Your Experience:</label>
               
                <textarea id="review-text" placeholder="Write your review here..." required></textarea>
            </div>

            <div class="input-group">
                <label for="review-rating">Rating (1-5):</label>
               
                <input type="number" id="review-rating" min="1" max="5" value="5" required>
            </div>

            
            <button type="submit" class="details-button">Submit Review</button>
        </form>
        
        
        <div id="message" style="text-align: center; margin-top: 15px;"></div>
    </section>
</main>

<footer>
    <p>© 2026 HBnB Evolution. All rights reserved.</p>
</footer>

<script src="scripts.js"></script>

</body>
</html>
